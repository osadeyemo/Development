version: "3.9"

services:
  app:
    build: ./app
    ports:
      - "5000:5000"
    networks:
      - monitor-net
    restart: always

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitor-net
    depends_on:
      - app
    restart: always

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitor-net
    depends_on:
      - prometheus
    restart: always

volumes:
  grafana_data:

networks:
  monitor-net:
    driver: bridge