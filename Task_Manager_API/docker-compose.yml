version: "3.9"
services:
  app:
    build: ./app
    container_name: task_app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - task-network
    restart: always

  db:
    image: postgres:15
    container_name: task_db
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - task-network
    restart: always

  redis:
    image: redis:7
    container_name: task_redis
    networks:
      - task-network
    restart: always

volumes:
  db_data:

networks:
  task-network:
    driver: bridge