version: "3.9"

services:
  app:
    build: ./app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - shop-net
    restart: always

  db:
    image: postgres:15
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - shop-net
    restart: always

  redis:
    image: redis:7
    networks:
      - shop-net
    restart: always

volumes:
  pg_data:

networks:
  shop-net:
    driver: bridge