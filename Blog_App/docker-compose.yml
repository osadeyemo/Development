version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - blog-net
    restart: always

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=${MONGO_URI}
    depends_on:
      - mongo
    networks:
      - blog-net
    restart: always

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - blog-net
    restart: always

volumes:
  mongo_data:

networks:
  blog-net:
    driver: bridge